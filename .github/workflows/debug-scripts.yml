name: Debug Scripts

on:
  push:
  pull_request:

jobs:
  debug-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot
        uses: barichello/godot-ci@v1
        with:
          version: 4.2.1
          use-dotnet: false

      - name: Debug scan in scripts folder
        run: |
          echo "Scanning GDScript files in scripts/..."
          for file in $(find scripts -name "*.gdscript"); do
            echo "Checking $file"
            godot --headless --check-only "$file"
          done
